# ============================================================
# .github/workflows/ticket_agent.yml
# ============================================================

name: Chicago Ticket Agent

on:
  schedule:
    # Every 30 min, 7:00 AM – 11:00 PM Eastern Daylight Time (UTC-4, April)
    - cron: '0,30 11-23 * * *'   # 11:00 AM – 11:30 PM UTC  (7AM–7:30PM ET)
    - cron: '0,30 0-3  * * *'    # 12:00 AM – 3:30 AM UTC   (8PM–11:30PM ET)

  workflow_dispatch:   # allows manual runs from the Actions tab

permissions:
  contents: write      # required so the workflow can commit seen_listings.json

jobs:
  search-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run ticket agent
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SMTP_SENDER_EMAIL:    ${{ secrets.SMTP_SENDER_EMAIL }}
          SMTP_APP_PASSWORD:    ${{ secrets.SMTP_APP_PASSWORD }}
          ALERT_EMAIL:          ${{ secrets.ALERT_EMAIL }}
        run: python chicago_agent.py

      - name: Save seen listings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_listings.json
          git commit -m "chore: update seen listings [skip ci]" || true
          git push
